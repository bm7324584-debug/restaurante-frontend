<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Gourmet Dashboard & Menu</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4757;
            --primary-hover: #ee2e3e;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #ff4757, #ff7f50);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        /* Contenedor de dos columnas para pantallas grandes */
        .grid-main {
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        @min-width: 900px {
            .grid-main {
                grid-template-columns: 380px 1fr;
            }
        }

        /* Formularios Estilo Neomórfico/Moderno */
        .card-panel {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            border: 1px solid #334155;
            height: fit-content;
        }

        .card-panel h2 {
            font-size: 1.4rem;
            margin-top: 0;
            margin-bottom: 20px;
            color: #fff;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-family: inherit;
            font-size: 0.95rem;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(255, 71, 87, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover {
            background: var(--primary-hover);
        }

        button:active {
            transform: scale(0.98);
        }

        /* Galería de Platillos "Perrona" */
        .menu-gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
        }

        .food-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            border: 1px solid #334155;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .food-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 71, 87, 0.15);
        }

        .food-img-container {
            width: 100%;
            height: 200px;
            position: relative;
            background: #0f172a;
        }

        .food-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .badge-category {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(5px);
            padding: 6px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .food-info {
            padding: 20px;
        }

        .food-title-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .food-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 0;
            color: white;
        }

        .food-price {
            font-size: 1.2rem;
            font-weight: 800;
            color: #2ed573;
            margin: 0;
        }

        .food-desc {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin: 0;
        }

        @media (min-width: 800px) {
            .grid-main { grid-template-columns: 350px 1fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🍽️ GOURMET MANAGER PRO</h1>
            <p style="color: var(--text-muted); margin: 0;">Administración de Menú Digital y Galería en Tiempo Real</p>
        </header>

        <div class="grid-main">
            <div class="card-panel">
                <h2>Nuevo Platillo</h2>
                <form id="formPlatillo">
                    <div class="form-group">
                        <label for="nombre">Nombre del Platillo</label>
                        <input type="text" id="nombre" placeholder="Ej. Hamburguesa de la Casa" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="categoria">Categoría</label>
                        <select id="categoria" required>
                            <option value="Entrada">Entrada</option>
                            <option value="Plato Fuerte" selected>Plato Fuerte</option>
                            <option value="Bebida">Bebida</option>
                            <option value="Postre">Postre</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="precio">Precio de Venta ($)</label>
                        <input type="number" id="precio" placeholder="Ej. 185" required>
                    </div>

                    <div class="form-group">
                        <label for="imagen">URL de la Imagen de la Galería</label>
                        <input type="url" id="imagen" placeholder="https://enlace-de-la-foto.com/imagen.jpg">
                    </div>

                    <div class="form-group">
                        <label for="descripcion">Descripción / Ingredientes</label>
                        <textarea id="descripcion" rows="3" placeholder="Ej. Doble carne angus, queso cheddar fundido y aderezo secreto..." required></textarea>
                    </div>

                    <button type="submit">Publicar en Galería</button>
                </form>
            </div>

            <div>
                <h2 style="font-size: 1.5rem; margin-top: 0; margin-bottom: 25px;">👨‍🍳 Galería de Menú en Vivo</h2>
                <div class="menu-gallery" id="galeriaPlatillos">
                    </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
