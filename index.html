<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ NextGen Gourmet Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #090d16;
            --bg-card: rgba(22, 28, 45, 0.6);
            --border-color: rgba(255, 255, 255, 0.08);
            --neon-accent: #ff3838;
            --neon-gradient: linear-gradient(135deg, #ff3838 0%, #ff793f 100%);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --success: #05c46b;
            --warning: #ffb142;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 40px 20px;
            background-image: radial-gradient(circle at 80% 20%, rgba(255, 56, 56, 0.08) 0%, transparent 40%),
                              radial-gradient(circle at 10% 80%, rgba(255, 121, 63, 0.05) 0%, transparent 40%);
            background-attachment: fixed;
        }

        .wrapper { max-width: 1300px; margin: 0 auto; }

        header { margin-bottom: 50px; text-align: left; position: relative;}
        header h1 {
            font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; margin: 0;
            background: linear-gradient(to right, #fff 30%, #64748b 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        header p { color: var(--text-muted); margin: 8px 0 0 0; font-size: 1.1rem; }
        header::after { content: ''; display: block; width: 60px; height: 4px; background: var(--neon-gradient); margin-top: 15px; border-radius: 10px; }

        .dashboard-layout { display: grid; grid-template-columns: 1fr; gap: 40px; }
        @media (min-width: 1000px) { .dashboard-layout { grid-template-columns: 400px 1fr; } }

        /* Panel de control de Cristal (Glassmorphism) */
        .glass-panel {
            background: var(--bg-card);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            padding: 35px; border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            height: fit-content;
            position: relative; overflow: hidden;
        }

        .glass-panel h2 { font-size: 1.5rem; margin: 0 0 25px 0; font-weight: 700; color: #fff; }
        
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.85rem; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input, select, textarea {
            width: 100%; padding: 14px 16px; background: rgba(15, 22, 38, 0.8);
            border: 1px solid var(--border-color); border-radius: 12px;
            color: #fff; font-family: inherit; font-size: 0.95rem; box-sizing: border-box;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        input:focus, select:focus, textarea:focus {
            outline: none; border-color: #ff3838;
            box-shadow: 0 0 0 4px rgba(255, 56, 56, 0.15); background: #0f1626;
        }

        .btn-neon {
            background: var(--neon-gradient); color: white; border: none;
            padding: 16px; border-radius: 12px; font-weight: 700; font-size: 1rem;
            cursor: pointer; width: 100%; transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 56, 56, 0.3);
        }
        .btn-neon:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 56, 56, 0.5); }
        .btn-neon:active { transform: translateY(0); }

        /* Galería GRID de Vanguardia */
        .showcase-title { font-size: 1.6rem; margin: 0 0 30px 0; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        .grid-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px; }

        /* Tarjetas de Platillos Superiores */
        .premium-card {
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 24px; overflow: hidden; display: flex; flex-direction: column;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .premium-card:hover {
            transform: translateY(-8px); border-color: rgba(255, 56, 56, 0.3);
            box-shadow: 0 20px 30px rgba(0, 0, 0, 0.5);
        }

        .img-wrapper { width: 100%; height: 210px; position: relative; background: #090d16; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .premium-card:hover .card-img { transform: scale(1.06); }
        
        .tag-cat {
            position: absolute; top: 15px; left: 15px; background: rgba(9, 13, 22, 0.85);
            backdrop-filter: blur(4px); padding: 5px 14px; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700; color: #ff793f; border: 1px solid rgba(255,121,63,0.2);
        }

        .card-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .meta-row { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .card-name { font-size: 1.3rem; font-weight: 700; margin: 0; color: #fff; line-height: 1.2; }
        .card-price { font-size: 1.4rem; font-weight: 800; color: var(--success); margin: 0; }
        .card-info-text { font-size: 0.9rem; color: #94a3b8; line-height: 1.6; margin: 0; }

        /* Contenedor de Botones Integrados */
        .action-tray {
            padding: 20px 25px; background: rgba(9, 13, 22, 0.4);
            border-top: 1px solid var(--border-color); display: flex; gap: 12px;
        }
        .btn-action-edit {
            background: rgba(255, 177, 66, 0.1); color: var(--warning);
            border: 1px solid rgba(255, 177, 66, 0.2); padding: 10px;
            border-radius: 10px; font-weight: 700; cursor: pointer; flex: 1; transition: all 0.2s;
        }
        .btn-action-edit:hover { background: var(--warning); color: #090d16; }
        
        .btn-action-delete {
            background: rgba(255, 56, 56, 0.1); color: var(--neon-accent);
            border: 1px solid rgba(255, 56, 56, 0.2); padding: 10px;
            border-radius: 10px; font-weight: 700; cursor: pointer; flex: 1; transition: all 0.2s;
        }
        .btn-action-delete:hover { background: var(--neon-accent); color: white; }
    </style>
</head>
<body>

    <div class="wrapper">
        <header>
            <h1>NEO-GOURMET</h1>
            <p>Panel Ejecutivo de Gestión de Menú Digital Avanzado</p>
        </header>

        <div class="dashboard-layout">
            <div class="glass-panel">
                <h2 id="panel-title">Agregar Platillo</h2>
                <form id="menuForm">
                    <input type="hidden" id="editTargetId">

                    <div class="input-group">
                        <label for="nombre">Nombre de la Creación</label>
                        <input type="text" id="nombre" placeholder="Ej. Hamburguesa Wagyu Trufada" required>
                    </div>

                    <div class="input-group">
                        <label for="categoria">Categoría Gastronómica</label>
                        <select id="categoria" required>
                            <option value="Entrada">Entrada</option>
                            <option value="Plato Fuerte" selected>Plato Fuerte</option>
                            <option value="Bebida">Bebida</option>
                            <option value="Postre">Postre</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label for="precio">Precio de Venta ($)</label>
                        <input type="number" id="precio" placeholder="Ej. 340" required>
                    </div>

                    <div class="input-group">
                        <label for="imagen">Enlace de Imagen Reluciente (URL)</label>
                        <input type="url" id="imagen" placeholder="https://images.unsplash.com/...">
                    </div>

                    <div class="input-group">
                        <label for="descripcion">Descripción de Sabor e Ingredientes</label>
                        <textarea id="descripcion" rows="3" placeholder="Detalla la experiencia de este platillo..." required></textarea>
                    </div>

                    <button type="submit" class="btn-neon" id="submitBtnText">Publicar Registro</button>
                </form>
            </div>

            <div>
                <h2 class="showcase-title"><span>✨</span> Catálogo en Vivo</h2>
                <div class="grid-gallery" id="foodShowcase"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
